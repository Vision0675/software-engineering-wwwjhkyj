version: '3.8'

services:
  # 网关服务：统一处理请求分发
  nginx_gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - admin_backend

  # 数据库服务
  campus_mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: campus_task_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 你负责的后台管理服务
  admin_backend:
    build: 
      context: ../admin_backend
      dockerfile: Dockerfile
    environment:
      - DB_URI=mysql+pymysql://root:root_password@campus_mysql:3306/campus_task_db
    depends_on:
      - campus_mysql

volumes:
  mysql_data:
