version: '3.8'

services:
  # Database for the project
  mysql_db:
    image: mysql:8.0
    container_name: campus_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: campus_task_db
    ports:
      - "3306:3306"

  # Cache for instant messaging
  redis_cache:
    image: redis:6.2-alpine
    container_name: campus_redis
    ports:
      - "6379:6379"

  # Backend API placeholder
  backend_api:
    build: ../backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql_db
