server {
    listen 80;
    server_name api.gongjicampus.local;

    # 微信小程序前端请求的通用 API 路由到业务后端 (队友负责的服务)
    location /api/v1/ {
        proxy_pass http://backend_api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # B端管理员系统请求路由到你写的 Admin 后台
    location /admin/ {
        proxy_pass http://admin_backend:8081/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
